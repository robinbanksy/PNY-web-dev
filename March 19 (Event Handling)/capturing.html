<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="parent capturing-parent">
        Parent
        <div class="child capturing-child">
            Child
        </div>
    </div>
    
    <script>
        for(let el of document.querySelectorAll('*')) {
            el.addEventListener("click", e => alert(`Capturing: ${el.tagName} ${el.className}`), true);
            el.addEventListener("click", e => alert(`Bubbling: ${el.tagName} ${el.className}`));
        }
    </script>
</body>
</html>
